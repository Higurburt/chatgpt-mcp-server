services:
  - type: web
    name: chatgpt-mcp-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MCP_TRANSPORT
        value: sse
      - key: PORT
        value: "8000"
